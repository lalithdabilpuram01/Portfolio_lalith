[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

# Cache busting for portfolio data — so edits go live immediately
[[headers]]
  for = "/portfolio.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Long-term cache for hashed JS/CSS assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
